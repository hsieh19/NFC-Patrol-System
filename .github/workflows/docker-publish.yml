name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db_type: [mysql, sqlite]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ matrix.db_type == 'mysql' }}
            type=raw,value=latest,enable=${{ matrix.db_type == 'mysql' }}
            type=raw,value=latest-sqlite,enable=${{ matrix.db_type == 'sqlite' }}
            type=semver,pattern={{version}}-sqlite,enable=${{ matrix.db_type == 'sqlite' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DB_TYPE=${{ matrix.db_type }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Create GitHub Release
  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Changelog Section
        id: extract_changelog
        shell: bash
        run: |
          # 提取当前 tag 对应版本的 changelog 内容
          # 假设格式为 ## [v0.1.0] - 日期
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # 移除 v 前缀以匹配 CHANGELOG 中的 [0.1.0]
          VERSION_NUM=${TAG_NAME#v}
          
          # 这里的 sed 逻辑是从匹配到当前版本行开始，直到遇到下一个 ## 开头的行为止
          # 如果没有下一个 ##，则直到文件末尾
          sed -n "/## \[$VERSION_NUM\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          
          # 检查文件是否为空
          if [ ! -s release_notes.md ]; then
            echo "No changelog info found for $VERSION_NUM. Using generic message."
            echo "Release $TAG_NAME" > release_notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
